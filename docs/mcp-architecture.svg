<svg viewBox="0 0 960 870" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Consulting MCP Server Architecture</title>
  <desc>Architecture diagram showing how an MCP client connects through the consulting MCP server to the RAG pipeline, document intelligence, and agentic audit backends via 11 composable tools.</desc>

  <style>
    .box-navy { fill: #1e3a5f; rx: 10; ry: 10; }
    .box-blue { fill: #0ea5e9; rx: 10; ry: 10; }
    .box-slate { fill: #5b6b7d; rx: 10; ry: 10; }
    .box-green { fill: #22c55e; rx: 10; ry: 10; }
    .box-rose { fill: #b5566e; rx: 10; ry: 10; }
    .box-amber { fill: #d97706; rx: 10; ry: 10; }
    .box-white { fill: #ffffff; rx: 10; ry: 10; stroke: #1e293b; stroke-width: 1.5; }
    .box-label { fill: #fff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
    .box-label-dark { fill: #1e293b; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
    .box-sub { fill: rgba(255,255,255,0.8); font-family: system-ui, sans-serif; font-size: 10px; text-anchor: middle; dominant-baseline: central; }
    .box-sub-dark { fill: #64748b; font-family: system-ui, sans-serif; font-size: 10px; text-anchor: middle; dominant-baseline: central; }
    .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .arrow-dash { stroke: #1e293b; stroke-width: 2; fill: none; marker-end: url(#arrowhead-black); stroke-dasharray: 6 4; }
    .phase-label { fill: #64748b; font-family: system-ui, sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .section-bg { fill: #f8fafc; rx: 12; ry: 12; opacity: 0.5; }
    .tool-box { fill: #ffffff; rx: 6; ry: 6; stroke: #cbd5e1; stroke-width: 1; }
    .tool-label { fill: #1e293b; font-family: system-ui, sans-serif; font-size: 11px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
    .tool-sub { fill: #64748b; font-family: system-ui, sans-serif; font-size: 9px; text-anchor: middle; dominant-baseline: central; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
    </marker>
    <marker id="arrowhead-black" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1e293b" />
    </marker>
  </defs>

  <!-- ===== MCP Clients ===== -->
  <text class="phase-label" x="50" y="30">MCP Clients</text>

  <rect class="box-white" x="130" y="45" width="150" height="44" />
  <text class="box-label-dark" x="205" y="61">Claude Desktop</text>
  <text class="box-sub-dark" x="205" y="77">GUI client</text>

  <rect class="box-white" x="330" y="45" width="150" height="44" />
  <text class="box-label-dark" x="405" y="61">Claude Code</text>
  <text class="box-sub-dark" x="405" y="77">CLI / IDE</text>

  <rect class="box-white" x="530" y="45" width="190" height="44" />
  <text class="box-label-dark" x="625" y="61">Any MCP Client</text>
  <text class="box-sub-dark" x="625" y="77">Standard protocol</text>

  <!-- Arrows from clients to protocol bar -->
  <line class="arrow" x1="205" y1="89" x2="205" y2="115" />
  <line class="arrow" x1="405" y1="89" x2="405" y2="115" />
  <line class="arrow" x1="625" y1="89" x2="625" y2="115" />

  <!-- Protocol bar -->
  <rect class="box-slate" x="130" y="115" width="590" height="34" />
  <text class="box-label" x="425" y="132">MCP Protocol (JSON-RPC over stdio)</text>

  <!-- Arrow to server -->
  <line class="arrow" x1="425" y1="149" x2="425" y2="180" />

  <!-- ===== MCP Server ===== -->
  <rect class="section-bg" x="20" y="180" width="920" height="340" />
  <text class="phase-label" x="50" y="205">Consulting MCP Server</text>

  <!-- Server core -->
  <rect class="box-navy" x="250" y="215" width="380" height="50" />
  <text class="box-label" x="440" y="234">server.py</text>
  <text class="box-sub" x="440" y="250">Tool registration · Request routing · Config</text>

  <!-- Arrows to tool handler boxes -->
  <line class="arrow" x1="320" y1="265" x2="170" y2="295" />
  <line class="arrow" x1="440" y1="265" x2="480" y2="295" />
  <line class="arrow" x1="560" y1="265" x2="780" y2="295" />

  <!-- RAG tools handler -->
  <rect class="box-blue" x="60" y="295" width="220" height="44" />
  <text class="box-label" x="170" y="311">rag_tools.py</text>
  <text class="box-sub" x="170" y="327">RAG tool handlers</text>

  <!-- Doc tools handler -->
  <rect class="box-blue" x="370" y="295" width="220" height="44" />
  <text class="box-label" x="480" y="311">doc_tools.py</text>
  <text class="box-sub" x="480" y="327">Doc tool handlers</text>

  <!-- Audit tools handler -->
  <rect class="box-blue" x="670" y="295" width="220" height="44" />
  <text class="box-label" x="780" y="311">audit_tools.py</text>
  <text class="box-sub" x="780" y="327">Audit tool handlers</text>

  <!-- RAG tools grid -->
  <rect class="tool-box" x="25" y="360" width="120" height="36" />
  <text class="tool-label" x="85" y="374">rag_query</text>
  <text class="tool-sub" x="85" y="388">Single-pass RAG</text>

  <rect class="tool-box" x="160" y="360" width="120" height="36" />
  <text class="tool-label" x="220" y="374">rag_agent_query</text>
  <text class="tool-sub" x="220" y="388">Multi-agent</text>

  <rect class="tool-box" x="95" y="410" width="120" height="36" />
  <text class="tool-label" x="155" y="424">rag_index</text>
  <text class="tool-sub" x="155" y="438">Re-index corpus</text>

  <!-- Doc tools grid -->
  <rect class="tool-box" x="340" y="360" width="120" height="36" />
  <text class="tool-label" x="400" y="374">doc_classify</text>
  <text class="tool-sub" x="400" y="388">Type detection</text>

  <rect class="tool-box" x="475" y="360" width="120" height="36" />
  <text class="tool-label" x="535" y="374">doc_extract</text>
  <text class="tool-sub" x="535" y="388">Full pipeline</text>

  <rect class="tool-box" x="340" y="410" width="120" height="36" />
  <text class="tool-label" x="400" y="424">doc_assess</text>
  <text class="tool-sub" x="400" y="438">Multi-doc analysis</text>

  <rect class="tool-box" x="475" y="410" width="120" height="36" />
  <text class="tool-label" x="535" y="424">doc_types</text>
  <text class="tool-sub" x="535" y="438">List schemas</text>

  <!-- Audit tools grid -->
  <rect class="tool-box" x="660" y="360" width="130" height="36" />
  <text class="tool-label" x="725" y="374">audit_gen_questions</text>
  <text class="tool-sub" x="725" y="388">From engagement docs</text>

  <rect class="tool-box" x="805" y="360" width="130" height="36" />
  <text class="tool-label" x="870" y="374">audit_process</text>
  <text class="tool-sub" x="870" y="388">Per-interview pipeline</text>

  <rect class="tool-box" x="730" y="410" width="130" height="36" />
  <text class="tool-label" x="795" y="424">audit_synthesize</text>
  <text class="tool-sub" x="795" y="438">Deliverable + summary</text>

  <!-- Health tool (centered) -->
  <rect class="tool-box" x="380" y="470" width="120" height="36" />
  <text class="tool-label" x="440" y="484">health</text>
  <text class="tool-sub" x="440" y="498">Status check</text>

  <!-- Arrows from tool handlers to tool grids -->
  <line class="arrow-dash" x1="120" y1="339" x2="85" y2="360" />
  <line class="arrow-dash" x1="210" y1="339" x2="220" y2="360" />
  <line class="arrow-dash" x1="430" y1="339" x2="400" y2="360" />
  <line class="arrow-dash" x1="530" y1="339" x2="535" y2="360" />
  <line class="arrow-dash" x1="730" y1="339" x2="725" y2="360" />
  <line class="arrow-dash" x1="830" y1="339" x2="870" y2="360" />

  <!-- ===== Connection to backends ===== -->
  <text class="phase-label" x="50" y="555">Path-Based Import</text>

  <rect class="box-slate" x="40" y="565" width="240" height="34" />
  <text class="box-label" x="160" y="582">sys.path → RAG_PIPELINE_PATH</text>

  <rect class="box-slate" x="340" y="565" width="240" height="34" />
  <text class="box-label" x="460" y="582">sys.path → DOC_INTEL_PATH</text>

  <rect class="box-slate" x="640" y="565" width="240" height="34" />
  <text class="box-label" x="760" y="582">sys.path → AUDIT_PATH</text>

  <!-- Arrows from tools to import bars -->
  <line class="arrow" x1="155" y1="446" x2="160" y2="565" />
  <line class="arrow" x1="400" y1="446" x2="460" y2="565" />
  <line class="arrow" x1="795" y1="446" x2="760" y2="565" />

  <!-- Arrows to backends -->
  <line class="arrow" x1="160" y1="599" x2="160" y2="640" />
  <line class="arrow" x1="460" y1="599" x2="460" y2="640" />
  <line class="arrow" x1="760" y1="599" x2="760" y2="640" />

  <!-- ===== Backend Repos ===== -->

  <!-- RAG Pipeline -->
  <rect class="section-bg" x="20" y="640" width="260" height="205" />
  <text class="phase-label" x="50" y="665">RAG Pipeline Repo</text>

  <rect class="box-green" x="40" y="680" width="110" height="36" />
  <text class="box-label" x="95" y="692">Retriever</text>
  <text class="box-sub" x="95" y="708">ChromaDB + MiniLM</text>

  <rect class="box-green" x="160" y="680" width="110" height="36" />
  <text class="box-label" x="215" y="692">Generator</text>
  <text class="box-sub" x="215" y="708">LLM + grounding</text>

  <rect class="box-green" x="40" y="730" width="110" height="36" />
  <text class="box-label" x="95" y="742">Agent</text>
  <text class="box-sub" x="95" y="758">Multi-query coord.</text>

  <rect class="box-green" x="160" y="730" width="110" height="36" />
  <text class="box-label" x="215" y="742">Guardrails</text>
  <text class="box-sub" x="215" y="758">Input/output checks</text>

  <rect class="box-white" x="65" y="780" width="180" height="28" />
  <text class="box-sub-dark" x="155" y="794">201 chunks · 5 source docs</text>

  <!-- Doc Intelligence -->
  <rect class="section-bg" x="320" y="640" width="280" height="205" />
  <text class="phase-label" x="350" y="665">Doc Intelligence Repo</text>

  <rect class="box-rose" x="340" y="680" width="120" height="36" />
  <text class="box-label" x="400" y="692">Classifier</text>
  <text class="box-sub" x="400" y="708">LLM + reasoning</text>

  <rect class="box-rose" x="470" y="680" width="120" height="36" />
  <text class="box-label" x="530" y="692">Extractor</text>
  <text class="box-sub" x="530" y="708">Schema-driven</text>

  <rect class="box-rose" x="340" y="730" width="120" height="36" />
  <text class="box-label" x="400" y="742">Validator</text>
  <text class="box-sub" x="400" y="758">Required + quality</text>

  <rect class="box-rose" x="470" y="730" width="120" height="36" />
  <text class="box-label" x="530" y="742">Analyzer</text>
  <text class="box-sub" x="530" y="758">Cross-doc findings</text>

  <rect class="box-white" x="370" y="780" width="180" height="28" />
  <text class="box-sub-dark" x="460" y="794">6 schemas · auto-discovery</text>

  <!-- Agentic Audit -->
  <rect class="section-bg" x="640" y="640" width="280" height="205" />
  <text class="phase-label" x="670" y="665">Agentic Audit Repo</text>

  <rect class="box-amber" x="660" y="680" width="120" height="36" />
  <text class="box-label" x="720" y="692">Intake</text>
  <text class="box-sub" x="720" y="708">Parse + tag inputs</text>

  <rect class="box-amber" x="790" y="680" width="120" height="36" />
  <text class="box-label" x="850" y="692">Answer</text>
  <text class="box-sub" x="850" y="708">Per-Q synthesis</text>

  <rect class="box-amber" x="660" y="730" width="120" height="36" />
  <text class="box-label" x="720" y="742">Analysis</text>
  <text class="box-sub" x="720" y="758">Principle eval</text>

  <rect class="box-amber" x="790" y="730" width="120" height="36" />
  <text class="box-label" x="850" y="742">Validation</text>
  <text class="box-sub" x="850" y="758">Cross-check + score</text>

  <rect class="box-white" x="690" y="780" width="180" height="28" />
  <text class="box-sub-dark" x="780" y="794">6 agents · Excel deliverable</text>

</svg>
